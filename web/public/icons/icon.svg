<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="icon-clip">
      <rect x="20" y="20" width="472" height="472" rx="80"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#f1f5f9"/>
  <rect width="512" height="512" rx="100" fill="none" stroke="#1e3a5f" stroke-width="16"/>
  
  <g clip-path="url(#icon-clip)">
    <!-- Map background elements -->
    <polygon points="0,512 0,350 120,512" fill="#86efac"/>
    <polygon points="350,0 512,0 512,150" fill="#bfdbfe"/>
    <line x1="0" y1="200" x2="200" y2="0" stroke="#fbbf24" stroke-width="40" stroke-linecap="round"/>
    <line x1="300" y1="512" x2="512" y2="300" stroke="#fbbf24" stroke-width="40" stroke-linecap="round"/>
    <line x1="0" y1="300" x2="512" y2="300" stroke="#fff" stroke-width="30"/>
    <line x1="200" y1="0" x2="200" y2="512" stroke="#fff" stroke-width="30"/>
    <line x1="0" y1="100" x2="512" y2="400" stroke="#e2e8f0" stroke-width="20"/>
    
    <!-- Route line -->
    <path d="M120,120 C120,200 80,250 80,320 C80,380 140,400 140,440 C140,470 200,470 200,470" fill="none" stroke="#1e3a5f" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="120" cy="120" r="20" fill="#fff" stroke="#1e3a5f" stroke-width="10"/>
    <circle cx="200" cy="470" r="20" fill="#fff" stroke="#1e3a5f" stroke-width="10"/>
    
    <!-- Map pin -->
    <g transform="translate(120,120)">
      <path d="M0,-80 C-40,-80 -70,-50 -70,-20 C-70,20 0,70 0,70 C0,70 70,20 70,-20 C70,-50 40,-80 0,-80Z" fill="#3b82f6" stroke="#1e3a5f" stroke-width="10"/>
      <circle cx="0" cy="-25" r="22" fill="#fff"/>
    </g>
    
    <!-- Bus -->
    <g transform="translate(320,220)">
      <rect x="-70" y="-80" width="140" height="160" rx="20" fill="#3b82f6" stroke="#1e3a5f" stroke-width="10"/>
      <rect x="-50" y="-65" width="100" height="20" rx="8" fill="#fff"/>
      <rect x="-55" y="-35" width="110" height="60" rx="10" fill="#1e3a5f"/>
      <polygon points="-40,-30 -10,-30 20,25 -10,25" fill="#3b82f6" opacity="0.5"/>
      <circle cx="-40" cy="50" r="14" fill="#fff" stroke="#1e3a5f" stroke-width="6"/>
      <circle cx="40" cy="50" r="14" fill="#fff" stroke="#1e3a5f" stroke-width="6"/>
      <rect x="-90" y="-40" width="16" height="40" rx="6" fill="#1e3a5f"/>
      <rect x="74" y="-40" width="16" height="40" rx="6" fill="#1e3a5f"/>
      <rect x="-55" y="80" width="30" height="20" rx="8" fill="#1e3a5f"/>
      <rect x="25" y="80" width="30" height="20" rx="8" fill="#1e3a5f"/>
    </g>
  </g>
</svg>
